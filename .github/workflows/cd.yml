name: CD — Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Build & Push ───────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      sha_short: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Server ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/clearjournal

            # ── Tag current running image as :stable (for rollback) ──
            CURRENT_IMAGE=$(docker compose -f docker-compose.prod.yml images -q api 2>/dev/null | head -1)
            if [ -n "$CURRENT_IMAGE" ]; then
              docker tag "$CURRENT_IMAGE" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
              echo "Tagged previous image as :stable"
            fi

            # ── Pull latest image ──
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # ── Rolling update (alembic runs inside container command) ──
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── Cleanup untagged/dangling images (keeps :stable and :latest) ──
            docker image prune -f

            # ── Health check (compose healthcheck also monitors, this is deploy-time verification) ──
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/api/v1/ > /dev/null; then
                echo "✅ API is healthy! Deployed ${{ needs.build-and-push.outputs.sha_short }}"
                exit 0
              fi
              sleep 2
            done
            echo "❌ API failed health check after 60s"
            docker compose -f docker-compose.prod.yml logs api
            exit 1

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const sha = '${{ needs.build-and-push.outputs.sha_short }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.sha }}',
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              description: `${status} Deploy ${sha} to production`,
              context: 'deploy/production',
            });

  # ─── Auto-Rollback on Failure ───────────────────────────────────────────────
  rollback:
    name: Auto-Rollback
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: production

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/clearjournal
            echo "⚠️ Rolling back to :stable..."

            # Check if stable tag exists locally
            if docker image inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable > /dev/null 2>&1; then
              # Stop current containers
              docker compose -f docker-compose.prod.yml down

              # Overwrite :latest with the stable image
              docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

              # Start with --no-pull to use the local :latest (not the broken remote one)
              docker compose -f docker-compose.prod.yml up -d --no-pull

              echo "✅ Rollback complete. Investigate the failed deployment."
            else
              echo "❌ No :stable tag found. Manual intervention required."
              exit 1
            fi
