
<style>
#erd { width: 100%; overflow-x: auto; }
#erd svg { min-width: 900px; }
.er-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.er-controls button { font-size: 12px; padding: 4px 10px; }
</style>
<h2 class="sr-only">ClearJournal database schema entity relationship diagram showing 21 tables and their relationships</h2>
<div class="er-controls">
  <button onclick="sendPrompt('Explain the trades and trade_executions relationship')">trades ↗</button>
  <button onclick="sendPrompt('Explain the billing tables: products, prices and subscriptions')">billing ↗</button>
  <button onclick="sendPrompt('Explain the conversations and messages tables')">AI chat ↗</button>
  <button onclick="sendPrompt('Explain the verification_pages table')">verification pages ↗</button>
</div>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  users {
    int id PK
    string full_name
    string email
    string password_hash
    string role
    bool is_active
    timestamp created_at
  }

  exchanges {
    int id PK
    string name
    string description
    json configs
    bool is_active
    string image_url
  }

  exchange_accounts {
    int id PK
    int user_id FK
    int exchange_id FK
    string name
    string api_key
    string api_secret_encrypted
    string passphrase_encrypted
    bool is_favorite
    bool is_active
    timestamp last_sync
    json error
  }

  wallets {
    int id PK
    string name
    string description
    bool is_active
  }

  wallet_accounts {
    int id PK
    int user_id FK
    int wallet_id FK
    string wallet_address
    string api_wallet_address
    string name
    bool is_verified
    bool is_favorite
    bool is_active
    timestamp last_sync
    json error
  }

  trades {
    int id PK
    int user_id FK
    int exchange_account_id FK
    int wallet_account_id FK
    string symbol
    string side
    float size
    timestamp open_time
    timestamp close_time
    float open_price
    float close_price
    float realized_pnl
    string status
    float duration
    float volume
  }

  trade_executions {
    int id PK
    int trade_id FK
    string side
    float size
    string type
    float price
    float fee
    float fee_percentage
    timestamp date
  }

  tags {
    int id PK
    int user_id FK
    string name
    string color
    bool is_favorite
    timestamp created_at
  }

  trade_tags {
    int id PK
    int trade_id FK
    int tag_id FK
  }

  notes {
    int id PK
    int user_id FK
    int trade_id FK
    string content
    string url
    timestamp created_at
  }

  note_images {
    int id PK
    int note_id FK
    string s3_key
    string image_url
    timestamp created_at
  }

  storages {
    int id PK
    int user_id FK
    string asset
    string location
    string from_source
    float amount
    timestamp date
    timestamp created_at
  }

  fiat_exposure {
    int id PK
    int user_id FK
    string amount_type
    string exchange
    float amount
    timestamp date
    timestamp created_at
  }

  verification_pages {
    int id PK
    int user_id FK
    string page_name
    bool show_pnl
    bool show_balance
    bool show_trade_history
    bool show_open_future_positions
    string twitter_url
    bool is_active
    timestamp created_at
  }

  products {
    int id PK
    string name
    string description
    int account_limit
    array descriptive_features
    bool is_active
    timestamp created_at
  }

  prices {
    int id PK
    int product_id FK
    string price_amount
    string price_currency
    int product_period_days
    bool is_annual
    bool is_monthly
    string paddle_price_id
    bool is_active
    timestamp created_at
  }

  subscriptions {
    int id PK
    int user_id FK
    int price_id FK
    int next_price_id FK
    string status
    timestamp start_date
    timestamp trial_end_date
    timestamp current_period_start
    timestamp current_period_end
    bool cancel_at_period_end
    string provider_customer_id
    string provider_subscription_id
    string payment_provider
    timestamp created_at
  }

  conversations {
    int id PK
    int user_id FK
    string title
    string openai_conversation_id
    timestamp created_at
  }

  messages {
    int id PK
    int conversation_id FK
    string content
    string sender_type
    string response
    timestamp created_at
  }

  user_instructions {
    int id PK
    int user_id FK
    string name
    string content
    int version
    bool is_active
    timestamp created_at
  }

  app_configs {
    int id PK
    string key
    string value
    string instructions
    bool is_active
    timestamp created_at
  }

  users ||--o{ exchange_accounts : "has"
  users ||--o{ wallet_accounts : "has"
  users ||--o{ trades : "owns"
  users ||--o{ tags : "creates"
  users ||--o{ notes : "writes"
  users ||--o{ storages : "records"
  users ||--o{ fiat_exposure : "logs"
  users ||--o| verification_pages : "has"
  users ||--o| subscriptions : "holds"
  users ||--o{ conversations : "starts"
  users ||--o{ user_instructions : "defines"

  exchanges ||--o{ exchange_accounts : "has"
  wallets ||--o{ wallet_accounts : "has"

  exchange_accounts ||--o{ trades : "source of"
  wallet_accounts ||--o{ trades : "source of"

  trades ||--o{ trade_executions : "filled by"
  trades ||--o{ trade_tags : "tagged with"
  trades ||--o{ notes : "annotated by"

  tags ||--o{ trade_tags : "applied to"

  notes ||--o{ note_images : "has"

  products ||--o{ prices : "priced as"
  prices ||--o{ subscriptions : "used in"

  conversations ||--o{ messages : "contains"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
