upstream api {
    server api:8000;
}

# Rate limiting (10 req/s per IP) — must be in http context
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# HTTP server — handles ACME challenges and redirects to HTTPS
server {
    listen 80;
    server_name api.clearjournal.app;

    # Let's Encrypt ACME challenge (always available)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check — always available on HTTP (no SSL required)
    location /api/v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # Redirect everything else to HTTPS
    location / {
        # If SSL certs don't exist yet, serve API directly on HTTP (initial deploy)
        # Once certs are provisioned, this redirects to HTTPS
        if (-f /etc/letsencrypt/live/api.clearjournal.app/fullchain.pem) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS server — only active when SSL certificates exist
server {
    listen 443 ssl http2;
    server_name api.clearjournal.app;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/api.clearjournal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.clearjournal.app/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SSE streaming — disable buffering
    location /api/v1/messages/stream {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-specific headers
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for AI endpoints (can take 30s+)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check (no rate limit)
    location = /api/v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # Docs (Swagger UI / ReDoc) — restrict in production
    location /docs {
        # Uncomment to restrict to internal IPs:
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://api;
    }

    location /redoc {
        proxy_pass http://api;
    }
}
